<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculs D&D</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="script.js" type="module" defer></script>
  </head>

  <body>
    <header>
      <h1>Calcul D&D</h1>
      <nav>
        <ul>
          <li><a href="Aodhan.html">Aodhan</a></li>
          <li><a href="mival.html">Mival</a></li>
          <li><a href="pavel.html">Pavel</a></li>
          <li><a class="visited home" href="thorek.html">Thorek</a></li>
          <li><a href="zinok.html">Zinok</a></li>
          <li><a href="adversaires.html">Ennemies</a></li>
        </ul>
      </nav>
    </header>

    <div class="main">
      <aside>
        <img src="Personnages/Thorek.JPG" alt="Thorek" class="animate__animated animate__fadeIn" />
        <div
          style="
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1 0 0;
            align-self: stretch;
          "
        >
          <div class="character-info">
            <h2>Thorek</h2>
            <p id="thorek-force">Force :</p>
            <p id="thorek-dexterite">Dextérité :</p>
            <p id="sorts-restants">Sorts restants : 5</p>
            <div class="sorts-container" id="sorts-container">
              <div class="sort-circle"></div>
              <div class="sort-circle"></div>
              <div class="sort-circle"></div>
              <div class="sort-circle"></div>
              <div class="sort-circle"></div>
            </div>
          </div>
          <button
            style="display: flex; width: 100%; justify-content: center"
            id="reset-spells-perso"
          >
            Restaurer les sorts
          </button>
        </div>
      </aside>

      <section class="animate__animated animate__fadeIn">
        <div class="attack-type">
          <h2>Armes</h2>
          <!-- Les tableaux d'armes seront générés dynamiquement -->
        </div>

        <div class="attack-type">
          <h2>Sorts</h2>
          <!-- Les tableaux de sorts seront générés dynamiquement -->
        </div>
      </section>
    </div>

    <footer>
      <div class="buttons-container">
        <button id="critique-btn">Coup critique</button>
        <button id="reset-btn">Réinitialiser</button>
      </div>
      <div class="total-container">
        <p>Total dégâts</p>
        <div class="total">
          <h2><span id="resultat">0</span></h2>
        </div>
      </div>
    </footer>
  </body>
</html>
